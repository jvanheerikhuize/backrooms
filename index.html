<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Backrooms — The Empty Yellow</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%23b8a12e'/></svg>"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="scene"></canvas>

    <!-- Camcorder HUD — only visible during cut-scenes (Feature 04) -->
    <div id="cutscene-hud">
      <div class="cc-top">
        <span class="cc-rec"><span class="cc-dot"></span>REC</span>
        <span class="cc-battery">▮▮▯</span>
      </div>
      <div class="cc-bottom">
        <span class="cc-stamp">▶ 00:00:00</span>
        <span class="cc-tracking">TRACKING</span>
      </div>
    </div>

    <!-- Ambient-audio state indicator (toggle with M) -->
    <div id="audio-indicator">🔊 audio</div>

    <!-- Points/sanity meter — above the hotbar, to its left. Drains slowly over time -->
    <div id="points-label" class="meter-label">SANITY</div>
    <div id="points"><div id="points-fill"></div></div>

    <!-- Sprint stamina bar — above the hotbar, to its right. Shown while draining/recovering -->
    <div id="stamina-label" class="meter-label">STAMINA</div>
    <div id="stamina"><div id="stamina-fill"></div></div>

    <!-- Hotbar (bottom-centre) — always visible; slots aren't wired to anything yet -->
    <div id="hotbar"></div>

    <!-- Inventory panel (toggle with F) -->
    <div id="inventory">
      <div class="inv-panel">
        <div class="inv-main">
          <div class="inv-title">INVENTORY</div>
          <div class="inv-grid"></div>
          <div class="inv-hint">F to close</div>
        </div>
        <div class="inv-detail">
          <canvas class="inv-detail-canvas"></canvas>
          <div class="inv-detail-name"></div>
          <div class="inv-detail-desc"></div>
        </div>
      </div>
    </div>

    <!-- Dev console lives in src/console.js — it builds its own DOM, toggled with ~ -->

    <!-- Click-to-start overlay: the opening plays as found-footage behind this -->
    <div id="overlay">
      <div class="overlay-inner">
        <h1>THE EMPTY YELLOW</h1>
        <p class="tag">You have noclipped out of reality.</p>
        <p class="hint">Click to enter</p>
        <p class="controls">
          WASD move &nbsp;·&nbsp; Mouse look &nbsp;·&nbsp; F inventory &nbsp;·&nbsp; ~ console &nbsp;·&nbsp; C cut-scene &nbsp;·&nbsp; V reduce motion
          &nbsp;·&nbsp; M mute &nbsp;·&nbsp; Esc release
        </p>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
